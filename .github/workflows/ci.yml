name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKER_COMPOSE_FILE: docker-compose.yml

# ============================================================
# Jobs
# ============================================================
jobs:

  # ------------------------------------------------
  # 后端：Maven 编译 + 测试（H2 内存库，无需 MySQL）
  # ------------------------------------------------
  backend:
    name: Backend (Maven)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build & Test
        run: mvn verify -B

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: target/*.jar
          retention-days: 3

  # ------------------------------------------------
  # 前端：TypeScript 类型检查 + ESLint + 构建 + 单元测试
  # ------------------------------------------------
  frontend:
    name: Frontend (Vue 3)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type Check (vue-tsc)
        run: npm run type-check

      - name: Lint (ESLint)
        run: npm run lint

      - name: Unit Tests (Vitest)
        run: npm test

      - name: Production Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 3

  # ------------------------------------------------
  # Docker：构建 + 集成测试（同一 runner，镜像立即可用）
  # ------------------------------------------------
  docker:
    name: Docker Build & Integration Test
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: inventory_crm
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -ppassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: inventory-crm-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: false
          load: true
          tags: inventory-crm-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify compose file is valid
        run: docker compose -f ${{ env.DOCKER_COMPOSE_FILE }} config --quiet && echo "✅ docker-compose.yml is valid"

      # ── Integration Tests ────────────────────────────
      - name: Start backend container (host network → MySQL on localhost:3306)
        run: |
          docker run -d --name inventory-crm-backend \
            --network host \
            -e SPRING_PROFILES_ACTIVE=dev \
            -e SPRING_DATASOURCE_URL="jdbc:mysql://localhost:3306/inventory_crm?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai" \
            -e SPRING_DATASOURCE_USERNAME=root \
            -e SPRING_DATASOURCE_PASSWORD=password \
            -e JWT_SECRET=ci-test-secret-key-2024 \
            -e NACOS_ENABLED=false \
            inventory-crm-backend:ci

      - name: Wait for backend health
        run: |
          for i in $(seq 1 60); do
            curl -sf http://localhost:8080/actuator/health && break
            sleep 2
          done

      - name: Login + save token
        run: |
          TOKEN=$(curl -sf -X POST http://localhost:8080/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"username":"admin","password":"admin123"}' \
            | jq -r '.token // .accessToken // .access_token')
          echo "TOKEN=$TOKEN" >> $GITHUB_ENV
          test -n "$TOKEN" && echo "✅ Login OK" || { echo "❌ Login failed"; exit 1; }

      - name: Test API — products
        run: |
          curl -sf http://localhost:8080/api/products \
            -H "Authorization: Bearer ${{ env.TOKEN }}" \
            | jq '.content' > /dev/null && echo "✅ Products OK"

      - name: Test API — customers
        run: |
          curl -sf http://localhost:8080/api/customers \
            -H "Authorization: Bearer ${{ env.TOKEN }}" \
            | jq '.content' > /dev/null && echo "✅ Customers OK"

      - name: Test API — stock in
        run: |
          curl -sf -X POST http://localhost:8080/api/inventories/in \
            -H "Authorization: Bearer ${{ env.TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"productId":1,"quantity":50,"reason":"CI test"}' \
            | jq '.' > /dev/null && echo "✅ Stock IN OK"

      - name: Test API — inventory logs
        run: |
          curl -sf http://localhost:8080/api/inventory-logs \
            -H "Authorization: Bearer ${{ env.TOKEN }}" \
            | jq '.content | length' > /dev/null && echo "✅ Inventory Logs OK"

      - name: Test API — Swagger / OpenAPI
        run: |
          curl -sf http://localhost:8080/v3/api-docs \
            | jq '.openapi' && echo "✅ OpenAPI OK"

      - name: Cleanup
        if: always()
        run: docker rm -f inventory-crm-backend 2>/dev/null; true

  # ------------------------------------------------
  # 发布：推送到 GitHub Container Registry（仅 main）
  # ------------------------------------------------
  publish:
    name: Publish to GHCR
    if: github.event_name == 'push' && github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest
    needs: [docker]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags
        id: meta
        run: |
          REPO="${{ github.repository }}"
          SHA="${{ github.sha }}"
          echo "BACKEND_TAGS=ghcr.io/${REPO}/backend:latest,ghcr.io/${REPO}/backend:${SHA}" >> $GITHUB_OUTPUT
          echo "FRONTEND_TAGS=ghcr.io/${REPO}/frontend:latest,ghcr.io/${REPO}/frontend:${SHA}" >> $GITHUB_OUTPUT

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.BACKEND_TAGS }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.FRONTEND_TAGS }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
