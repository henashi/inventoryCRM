app:
  create-default-users: true
  cache:
    initial-capacity: 100
    max-size: 2000
    expire-write-minutes: 5
    expire-access-minutes: 5

spring:
  application:
    name: inventoryCRM
  profiles:
    default: dev
  devtools:
    restart:
      enabled: true
  datasource:
    url: jdbc:mysql://localhost:3306/inventory_crm?serverTimezone=UTC
    username: root
    password: ${DB_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
      jakarta:
        persistence:
          schema-generation:
            scripts:
              action: create
              create-target: create.sql

jwt:
  # 从环境变量读取，生产环境必须设置 JWT_SECRET
  secret: ${JWT_SECRET:aBcDeFgHiJkLmNoPqRsTuVwXyZ0123456789+/ab==}
  # 1 day
  expiration: 86400000
  # 7 days
  refresh-expiration: 604800000
  issuer: inventory-crm
  audience: crm-users
  token-prefix: Bearer
  token-header: Authorization

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    api-docs:
      path: /v3/api-docs
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  prometheus:
    metrics:
      export:
        enabled: true
  endpoint:
    health:
      show-details: always

ai:
  api-key: ${AI_API_KEY:}
  api-url: ${AI_API_URL:https://api.deepseek.com/chat/completions}
  model: ${AI_MODEL:deepseek-chat}

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        record-exceptions:
          - org.springframework.web.client.ResourceAccessException
          - org.springframework.web.client.HttpServerErrorException
    instances:
      llmService:
        base-config: default
  ratelimiter:
    configs:
      default:
        limit-for-period: 10
        limit-refresh-period: 1m
        timeout-duration: 5s
    instances:
      llmService:
        base-config: default

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.hibernate.orm.jdbc.bind: TRACE
    org.springframework.boot.devtools: TRACE
    org.springframework.boot.devtools.restart: DEBUG
