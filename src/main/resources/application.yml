spring:
  application:
    name: inventoryCRM
  profiles:
    default: dev
  devtools:
    restart:
      enabled: false
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
      jakarta:
        persistence:
          schema-generation:
            scripts:
              action: create
              create-target: create.sql

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    api-docs:
      path: /v3/api-docs
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  prometheus:
    metrics:
      export:
        enabled: true
  endpoint:
    health:
      show-details: always
