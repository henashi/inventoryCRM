spring.application.name=inventoryCRM
spring.datasource.url=jdbc:mysql://localhost:3306/inventory_crm?serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=password
spring.mvc.log-request-details=true
spring.devtools.restart.enabled=true
# livereload default close
#spring.devtools.livereload.enabled=true

spring.security.user.name=test
spring.security.user.password=test

# Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# DDL Generation
spring.jpa.properties.jakarta.persistence.schema-generation.scripts.action=create
spring.jpa.properties.jakarta.persistence.schema-generation.scripts.create-target=create.sql

# SQL Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.hibernate.orm.jdbc.bind=TRACE
# DevTools
logging.level.org.springframework.boot.devtools=TRACE
logging.level.org.springframework.boot.devtools.restart=DEBUG
# ========== JWT  ==========
# JWT
# openssl rand -base64 32
jwt.secret=aBcDeFgHiJkLmNoPqRsTuVwXyZ0123456789+/ab==
# 1 day
jwt.expiration=86400000
# 7 days
jwt.refresh-expiration=604800000
jwt.issuer=inventory-crm
jwt.audience=crm-users
jwt.token-prefix=Bearer
jwt.token-header=Authorization

# Swagger UI path
springdoc.swagger-ui.path=/swagger-ui.html
# Enable Swagger UI
springdoc.swagger-ui.enabled=true
# OpenAPI JSON docs path
springdoc.swagger-ui.api-docs.path=/v3/api-docs
springdoc.swagger-ui.api-docs.enabled=true

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.prometheus.metrics.export.enabled=true
management.endpoint.health.show-details=always

# Cache
caffeine.short.init-capacity=100
caffeine.short.max-size=2000
# unit: minute
caffeine.short.expire-write=5
caffeine.short.short-access=5