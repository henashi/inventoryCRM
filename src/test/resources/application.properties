spring.profiles.active=test
spring.application.name=inventoryCRM-test
spring.config.import=
spring.cloud.nacos.config.enabled=false
spring.datasource.url=jdbc:h2:mem:inventorycrm-${random.uuid};MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.jpa.show-sql=false
jwt.secret=test-secret-key-test-secret-key-123456
jwt.expiration=3600000
jwt.refresh-expiration=604800000
